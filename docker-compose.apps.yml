services:
  backend-api:
    build:
      context: ../backend-api
    environment:
      NODE_ENV: production
      PORT: 3000
      GRAPHQL_PATH: /graphql
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - platform-net

  scraper-service:
    build:
      context: ../scraper-service
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      QUEUE_RAW_EVENT: source.raw.v1
      SCRAPE_SCHEDULE: "*/20 * * * *"
      USE_PLAYWRIGHT: "false"
      SHARED_CONTRACTS_DIR: /opt/shared-contracts
    volumes:
      - ./contracts:/opt/shared-contracts:ro
    depends_on:
      - rabbitmq
    networks:
      - platform-net

  processing-worker:
    build:
      context: ../processing-worker
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      API_GRAPHQL_URL: http://backend-api:3000/graphql
      QUEUE_RAW_EVENT: source.raw.v1
      QUEUE_NORMALIZED_EVENT: source.normalized.v1
      SHARED_CONTRACTS_DIR: /opt/shared-contracts
    volumes:
      - ./contracts:/opt/shared-contracts:ro
    depends_on:
      - rabbitmq
      - backend-api
    networks:
      - platform-net

  aimsora:
    build:
      context: ../aimsora
      args:
        VITE_GRAPHQL_ENDPOINT: /graphql
    ports:
      - "8080:80"
    depends_on:
      - backend-api
    networks:
      - platform-net

networks:
  platform-net: {}
