name: Deploy Stand

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Docker tag for all apps"
        required: true
        default: edge
      deploy_path:
        description: "Remote path for compose files"
        required: true
        default: /opt/aimsora
      ssh_port:
        description: "SSH port"
        required: true
        default: "22"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ inputs.ssh_port }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Build deploy env file
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          RABBITMQ_DEFAULT_USER: ${{ secrets.RABBITMQ_DEFAULT_USER }}
          RABBITMQ_DEFAULT_PASS: ${{ secrets.RABBITMQ_DEFAULT_PASS }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          BACKEND_API_IMAGE: ${{ vars.BACKEND_API_IMAGE }}
          SCRAPER_SERVICE_IMAGE: ${{ vars.SCRAPER_SERVICE_IMAGE }}
          PROCESSING_WORKER_IMAGE: ${{ vars.PROCESSING_WORKER_IMAGE }}
          FRONTEND_APP_IMAGE: ${{ vars.FRONTEND_APP_IMAGE }}
        run: |
          set -euo pipefail
          cat > .env.deploy <<EOF
          POSTGRES_DB=${POSTGRES_DB:-procurement}
          POSTGRES_USER=${POSTGRES_USER:-app}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-replace_me}
          RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-app}
          RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-app}
          MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio}
          MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio123}
          MINIO_BUCKET=${MINIO_BUCKET:-scraper-artifacts}

          BACKEND_API_IMAGE=${BACKEND_API_IMAGE:-ghcr.io/aimsora/backend-api}
          BACKEND_API_IMAGE_TAG=${IMAGE_TAG}
          SCRAPER_SERVICE_IMAGE=${SCRAPER_SERVICE_IMAGE:-ghcr.io/aimsora/scraper-service}
          SCRAPER_SERVICE_IMAGE_TAG=${IMAGE_TAG}
          PROCESSING_WORKER_IMAGE=${PROCESSING_WORKER_IMAGE:-ghcr.io/aimsora/processing-worker}
          PROCESSING_WORKER_IMAGE_TAG=${IMAGE_TAG}
          FRONTEND_APP_IMAGE=${FRONTEND_APP_IMAGE:-ghcr.io/aimsora/frontend-app}
          FRONTEND_APP_IMAGE_TAG=${IMAGE_TAG}
          EOF

      - name: Sync compose files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ inputs.ssh_port }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete -e "ssh -p $SSH_PORT" \
            docker-compose.yml \
            docker-compose.deploy.yml \
            contracts \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          scp -P "$SSH_PORT" .env.deploy "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/.env"

      - name: Deploy stack on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ inputs.ssh_port }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            cd '$DEPLOY_PATH'
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.deploy.yml up -d
            docker image prune -f
          "
